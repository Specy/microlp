name: Continuous Integration
on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  conformance:
    name: Conformance
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-nightly-${{ hashFiles('Cargo.toml') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          components: rustfmt, clippy
          override: true

      - name: Rustfmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --check

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- --deny warnings
  test:
    strategy:
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-${{ matrix.rust }}-${{ hashFiles('Cargo.toml') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Test Rust (unit tests)
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release --lib

      - name: Doctests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release --doc

      # Problem-based correctness suite. The default invocation runs the quick
      # and standard tiers (~200 cases, a couple of minutes at most on CI) and
      # deliberately excludes the `hard` tier: the long-running MILP benchmarks
      # and the cases that pin known, still-open solver bugs. Run those locally
      # with `cargo test --release --test suite -- --hard`.
      - name: Correctness suite
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release --test suite

      - name: Test Rust with traces
        uses: actions-rs/cargo@v1
        env:
          RUST_LOG: "trace"
        with:
          command: test
          args: --lib

  publish-crate:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [conformance, test]

    name: Publish to Crates.io
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Publish
        run: cargo publish --token ${REGISTRY_TOKEN}
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
